[platformio]
default_envs = cc-radar

; PlatformIO Project Configuration File
; ESP-IDF framework build (migrated from Arduino)

[env:cc-radar]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf
board_upload.flash_size = 16MB
board_build.partitions = partitions/partitions_ota.csv
board_build.filesystem = fatfs
board_build.flash_mode = dio
board_build.f_flash = 80000000L
upload_speed = 460800
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0

extra_scripts = scripts/gen_version.py

build_flags =
    -DLV_CONF_INCLUDE_SIMPLE
    -Iinclude
    -Wno-format
    -Wno-misleading-indentation
    -Iinclude/core
    -Iinclude/hardware/display
    -Iinclude/hardware/sensors
    -Iinclude/hardware/connectivity
    -Iinclude/hardware/i2c
    -Iinclude/hardware/input
    -Iinclude/ui
    -Iinclude/ui/fonts
    -Iinclude/utils
    -Iinclude/gpx
    -Iinclude/navigation

lib_deps =
    lvgl/lvgl@^8.3.11
    https://github.com/h2zero/esp-nimble-cpp.git#v1.4.1
